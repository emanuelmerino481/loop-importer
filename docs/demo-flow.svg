<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Loop Importer demo flow</title>
  <desc id="desc">An incomplete research project is read without execution, converted to evidence and task candidates, then reviewed by a human one question at a time.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f172a"/><stop offset="1" stop-color="#172554"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#93c5fd"/></marker>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <text x="60" y="62" fill="#fff" font-family="system-ui,sans-serif" font-size="30" font-weight="700">From research folder to reviewable Harness draft</text>
  <text x="60" y="94" fill="#bfdbfe" font-family="system-ui,sans-serif" font-size="17">Read-only • evidence-linked • human-approved</text>
  <g filter="url(#shadow)" font-family="system-ui,sans-serif">
    <rect x="60" y="138" width="270" height="210" rx="18" fill="#fff"/>
    <text x="88" y="178" fill="#0f172a" font-size="21" font-weight="700">Messy project</text>
    <text x="88" y="215" fill="#475569" font-size="16">configs/experiment.yaml</text>
    <text x="88" y="244" fill="#475569" font-size="16">scripts/train.py</text>
    <text x="88" y="273" fill="#475569" font-size="16">results/*_old.json</text>
    <text x="88" y="302" fill="#475569" font-size="16">logs/ + .env</text>
    <rect x="88" y="318" width="170" height="8" rx="4" fill="#f59e0b"/>
    <rect x="465" y="138" width="270" height="210" rx="18" fill="#fff"/>
    <text x="493" y="178" fill="#0f172a" font-size="21" font-weight="700">Import packet</text>
    <text x="493" y="215" fill="#475569" font-size="16">artifact registry + IDs</text>
    <text x="493" y="244" fill="#475569" font-size="16">LOW-confidence DAG</text>
    <text x="493" y="273" fill="#475569" font-size="16">redacted secrets</text>
    <text x="493" y="302" fill="#475569" font-size="16">Chinese HTML report</text>
    <rect x="493" y="318" width="170" height="8" rx="4" fill="#3b82f6"/>
    <rect x="870" y="138" width="270" height="210" rx="18" fill="#fff"/>
    <text x="898" y="178" fill="#0f172a" font-size="21" font-weight="700">Human review</text>
    <text x="898" y="215" fill="#475569" font-size="16">inspect evidence</text>
    <text x="898" y="244" fill="#475569" font-size="16">ask one question</text>
    <text x="898" y="273" fill="#475569" font-size="16">confirm or correct</text>
    <text x="898" y="302" fill="#475569" font-size="16">approve activation</text>
    <rect x="898" y="318" width="170" height="8" rx="4" fill="#22c55e"/>
  </g>
  <path d="M350 243 H440" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M755 243 H845" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="364" y="225" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="14">never execute</text>
  <text x="772" y="225" fill="#dbeafe" font-family="system-ui,sans-serif" font-size="14">never assume</text>
</svg>
