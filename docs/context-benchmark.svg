<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Measured context growth and consistency benchmark</title>
  <desc id="desc">In a controlled synthetic benchmark, full startup context grows with history while the selected evidence-safe bundle remains bounded. Same-snapshot digests match and stale facts are excluded.</desc>
  <style>
    .title{font:700 28px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a} .sub{font:15px Inter,Segoe UI,Arial,sans-serif;fill:#64748b}
    .label{font:600 14px Inter,Segoe UI,Arial,sans-serif;fill:#334155} .value{font:700 26px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
    .axis{font:13px Inter,Segoe UI,Arial,sans-serif;fill:#64748b} .legend{font:600 13px Inter,Segoe UI,Arial,sans-serif;fill:#334155}
  </style>
  <rect width="1200" height="620" rx="28" fill="#f8fafc"/><rect x="1" y="1" width="1198" height="618" rx="27" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="54" class="title">Measured context cost and drift controls</text>
  <text x="60" y="82" class="sub">Controlled synthetic project · canonical UTF-8 payload bytes · generated from benchmark JSON</text>
  <rect x="60" y="110" width="1080" height="1" fill="#dbe4f0"/>
  <text x="60" y="151" class="label">CONTEXT GROWTH ACROSS HISTORY ROUNDS</text>
  <line x1="90" y1="440" x2="810" y2="440" stroke="#cbd5e1"/><line x1="90" y1="190" x2="90" y2="440" stroke="#cbd5e1"/>
  <polyline points="90.0,432.8 270.0,409.8 450.0,381.0 630.0,323.5 810.0,208.5" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="90.0,425.1 270.0,425.1 450.0,425.1 630.0,425.1 810.0,425.1" fill="none" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="90.0" y="466" text-anchor="middle" class="axis">1</text><text x="270.0" y="466" text-anchor="middle" class="axis">5</text><text x="450.0" y="466" text-anchor="middle" class="axis">10</text><text x="630.0" y="466" text-anchor="middle" class="axis">20</text><text x="810.0" y="466" text-anchor="middle" class="axis">40</text>
  <text x="450" y="495" text-anchor="middle" class="axis">accumulated history rounds</text>
  <circle cx="120" cy="535" r="6" fill="#f59e0b"/><text x="136" y="540" class="legend">Full startup read</text>
  <circle cx="300" cy="535" r="6" fill="#16a34a"/><text x="316" y="540" class="legend">Selected context bundle</text>
  <text x="90" y="565" class="sub">Round 1: 1,286 B → 2,654 B (106.38% metadata overhead)</text>
  <text x="90" y="587" class="sub">Round 40: 41,300 B → 2,654 B (93.57% less)</text>

  <rect x="850" y="145" width="290" height="96" rx="16" fill="#ffffff" stroke="#dbe4f0"/><text x="874" y="176" class="label">SAME SNAPSHOT DIGEST</text><text x="874" y="218" class="value">20/20</text>
  <rect x="850" y="257" width="290" height="96" rx="16" fill="#ffffff" stroke="#dbe4f0"/><text x="874" y="288" class="label">STALE DETECTION RECALL</text><text x="874" y="330" class="value">100%</text>
  <rect x="850" y="369" width="290" height="96" rx="16" fill="#ffffff" stroke="#dbe4f0"/><text x="874" y="400" class="label">FALSE STALE</text><text x="874" y="442" class="value">0</text>
  <rect x="850" y="481" width="290" height="96" rx="16" fill="#ffffff" stroke="#dbe4f0"/><text x="874" y="512" class="label">STALE FACTS LOADED</text><text x="874" y="554" class="value">0</text>
  <text x="60" y="610" class="axis">Synthetic functional benchmark, not a model-token or production-latency benchmark · digest 8b05fa949165</text>
</svg>